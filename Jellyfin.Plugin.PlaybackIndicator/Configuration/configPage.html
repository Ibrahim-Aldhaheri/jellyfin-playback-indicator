<div id="PlaybackIndicatorConfigPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-checkbox,emby-button">
    <div data-role="content">
        <div class="content-primary">
            <h2>Playback Indicator</h2>
            <p>Shows direct-play / direct-stream / transcode badges on items.</p>
            <form id="PlaybackIndicatorConfigForm">
                <div class="inputContainer">
                    <label class="inputLabel" for="CacheTtlMinutes">Cache TTL (minutes)</label>
                    <input type="number" id="CacheTtlMinutes" name="CacheTtlMinutes" min="1" max="1440" value="60"
                           is="emby-input" />
                    <div class="fieldDescription">How long to cache playback info per item.</div>
                </div>
                <div class="checkboxContainer">
                    <label class="emby-checkbox-label">
                        <input type="checkbox" id="ShowBadgeOnMovies" is="emby-checkbox" />
                        <span>Show badges on movies</span>
                    </label>
                </div>
                <div class="checkboxContainer">
                    <label class="emby-checkbox-label">
                        <input type="checkbox" id="ShowBadgeOnEpisodes" is="emby-checkbox" />
                        <span>Show badges on episodes</span>
                    </label>
                </div>
                <br />
                <button is="emby-button" type="submit" class="raised button-submit block">
                    <span>Save</span>
                </button>
            </form>

            <h3 style="margin-top: 2em;">Cache Management</h3>
            <button is="emby-button" type="button" id="btnClearCache" class="raised" style="margin-bottom: 1em;">
                Clear All Cache
            </button>

            <details id="cacheViewerSection" style="margin-top: 1em;">
                <summary style="cursor: pointer; font-weight: 600; margin-bottom: 0.5em;">Device Cache</summary>
                <div style="overflow-x: auto;">
                    <table id="cacheTable" style="width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 0.5em;">
                        <thead>
                            <tr style="border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left;">
                                <th style="padding: 6px 8px;">Item ID</th>
                                <th style="padding: 6px 8px;">Device ID</th>
                                <th style="padding: 6px 8px;">Badge</th>
                                <th style="padding: 6px 8px;">Reason</th>
                                <th style="padding: 6px 8px;">Expires</th>
                                <th style="padding: 6px 4px;"></th>
                            </tr>
                        </thead>
                        <tbody id="cacheTableBody"></tbody>
                    </table>
                    <p id="cacheEmptyMsg" style="color: #888; font-size: 13px; display: none;">No cached entries.</p>
                </div>
            </details>
        </div>
    </div>
    <script type="text/javascript">
        (function () {
            var pluginId = 'b6f3e2a1-d4c5-4e7a-8b3f-9e2d1c0a8b5e';
            // Keep in sync with playback-indicator.js RESULT_PREFIX / ALL_PREFIXES.
            var RESULT_PREFIX = 'jpi_v8_';
            var ALL_JPI_PREFIXES = ['jpi_v2_', 'jpi_v3_', 'jpi_v4_', 'jpi_v5_', 'jpi_v6_', 'jpi_v7_', 'jpi_v8_',
                                    'jpi_type_', 'jpi_profile', 'jpi_real_profile'];
            var page = document.querySelector('#PlaybackIndicatorConfigPage');

            function loadConfig() {
                ApiClient.getPluginConfiguration(pluginId).then(function (config) {
                    document.getElementById('CacheTtlMinutes').value = config.CacheTtlMinutes || 60;
                    document.getElementById('ShowBadgeOnMovies').checked = config.ShowBadgeOnMovies !== false;
                    document.getElementById('ShowBadgeOnEpisodes').checked = config.ShowBadgeOnEpisodes !== false;
                }).catch(function (err) {
                    console.error('[PlaybackIndicator] Failed to load config:', err);
                });
            }

            document.querySelector('#PlaybackIndicatorConfigForm').addEventListener('submit', function (e) {
                e.preventDefault();
                ApiClient.getPluginConfiguration(pluginId).then(function (config) {
                    config.CacheTtlMinutes = parseInt(document.getElementById('CacheTtlMinutes').value) || 60;
                    config.ShowBadgeOnMovies = document.getElementById('ShowBadgeOnMovies').checked;
                    config.ShowBadgeOnEpisodes = document.getElementById('ShowBadgeOnEpisodes').checked;
                    return ApiClient.updatePluginConfiguration(pluginId, config);
                }).then(function () {
                    Dashboard.alert('Settings saved.');
                }).catch(function (err) {
                    console.error('[PlaybackIndicator] Failed to save config:', err);
                    Dashboard.alert('Error saving settings.');
                });
            });

            document.getElementById('btnClearCache').addEventListener('click', function () {
                var keys = Object.keys(localStorage).filter(function (k) {
                    for (var i = 0; i < ALL_JPI_PREFIXES.length; i++) {
                        if (k.indexOf(ALL_JPI_PREFIXES[i]) === 0) return true;
                    }
                    return false;
                });
                keys.forEach(function (k) { localStorage.removeItem(k); });
                refreshCacheTable();
                Dashboard.alert('Cleared ' + keys.length + ' cache entries.');
            });

            function truncate(str, len) {
                return str.length > len ? str.substring(0, len) + '\u2026' : str;
            }

            function badgeLabel(type) {
                if (type === 'direct') return 'Direct';
                if (type === 'remux') return 'Re-mux';
                if (type === 'stream') return 'Stream';
                if (type === 'transcode') return 'Transcode';
                return type || '?';
            }

            function refreshCacheTable() {
                var tbody = document.getElementById('cacheTableBody');
                var emptyMsg = document.getElementById('cacheEmptyMsg');
                tbody.textContent = '';

                var keys = Object.keys(localStorage).filter(function (k) { return k.startsWith(RESULT_PREFIX); });

                if (keys.length === 0) {
                    emptyMsg.style.display = 'block';
                    return;
                }
                emptyMsg.style.display = 'none';

                keys.forEach(function (fullKey) {
                    try {
                        var entry = JSON.parse(localStorage.getItem(fullKey));
                        // Key format: {prefix}{itemId}_{userId}_{deviceId}_{codecFp}
                        var parts = fullKey.substring(RESULT_PREFIX.length).split('_');
                        var itemId = parts[0] || '';
                        var deviceId = parts[2] || '';
                        var data = entry.data || {};
                        var expires = entry.expires ? new Date(entry.expires).toLocaleString() : '?';

                        var tr = document.createElement('tr');
                        tr.style.borderBottom = '1px solid rgba(255,255,255,0.05)';

                        function addCell(text, style) {
                            var td = document.createElement('td');
                            td.style.cssText = style;
                            td.textContent = text;
                            tr.appendChild(td);
                            return td;
                        }

                        addCell(truncate(itemId, 12), 'padding:4px 8px;font-family:monospace;');
                        addCell(truncate(deviceId, 12), 'padding:4px 8px;font-family:monospace;');
                        addCell(badgeLabel(data.type), 'padding:4px 8px;');
                        addCell(data.reason || '\u2014', 'padding:4px 8px;color:#aaa;');
                        addCell(expires, 'padding:4px 8px;color:#888;font-size:12px;');
                        var actionCell = addCell('', 'padding:4px 4px;');

                        var delBtn = document.createElement('button');
                        delBtn.textContent = '\u2715';
                        delBtn.title = 'Remove this entry';
                        delBtn.style.cssText = 'background:none;border:none;color:#e55;cursor:pointer;font-size:14px;padding:2px 6px;';
                        delBtn.addEventListener('click', function () {
                            localStorage.removeItem(fullKey);
                            refreshCacheTable();
                        });
                        actionCell.appendChild(delBtn);
                        tbody.appendChild(tr);
                    } catch (_) {}
                });
            }

            document.getElementById('cacheViewerSection').addEventListener('toggle', function () {
                if (this.open) refreshCacheTable();
            });

            page.addEventListener('pageshow', function () {
                loadConfig();
                refreshCacheTable();
            });

            page.addEventListener('viewshow', function () {
                loadConfig();
                refreshCacheTable();
            });
        })();
    </script>
</div>
